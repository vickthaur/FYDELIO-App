<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Carte Fidélité</title>
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff7675; /* Remplacé automatiquement par config.js */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e1e1e; width: 100%; max-width: 350px; border-radius: 25px; padding: 35px 25px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .logo-resto { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #888; margin-bottom: 25px; }
        .welcome { font-size: 16px; margin-bottom: 5px; }
        .points-number { font-size: 64px; font-weight: 700; color: var(--primary); line-height: 1; margin: 15px 0; }
        .points-label { font-size: 12px; color: #888; letter-spacing: 1px; margin-bottom: 20px; }
        
        .progress-container { background: #333; height: 12px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 1.5s ease-in-out; }
        
        #qrcode { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin: 25px 0; }
        .instructions { font-size: 12px; color: #666; line-height: 1.5; }

        /* Animation de chargement des points */
        .loading-pulse { animation: pulse 1.5s infinite; color: #888; font-size: 24px; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-resto nom-resto">Chargement...</div>
        <p class="welcome">Bonjour, <strong id="user-prenom" style="color: var(--primary);">...</strong> !</p>
        
        <div class="points-display">
            <div class="points-number loading-pulse" id="user-points">...</div>
            <div class="points-label">POINTS CUMULÉS</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="barre-progression"></div>
        </div>

        <p id="phrase-info" style="font-size: 13px; color: #bbb; font-weight: 500;">Calcul des points...</p>

        <div id="qrcode"></div>
        
        <p class="instructions">Présentez ce code au serveur <br>pour valider votre passage.</p>
    </div>

    <script>
        // 1. On applique les couleurs et textes du resto (via config.js)
        if (typeof appliquerConfig === "function") {
            appliquerConfig();
        }
        
        // 2. Configuration depuis l'URL (resto et email)
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const maxPoints = 5; // Le maximum pour le cadeau
        
        // 🔗 TON NOUVEAU LIEN GOOGLE SCRIPT EST ICI :
        const scriptURL = "https://script.google.com/macros/s/AKfycbyl8joE1RKd1f6enmwc9IUTLfmn6aAfSdby5RpuM6iHDJTTCarPbldwUsd_QgQuZhPB/exec";

        // 3. Fonction pour mettre à jour l'affichage avec les données réelles
        function mettreAJourCarte(points, prenom) {
            document.getElementById('user-prenom').innerText = prenom || "Client";
            
            const pointsEl = document.getElementById('user-points');
            pointsEl.innerText = points;
            pointsEl.classList.remove('loading-pulse'); // On enlève l'animation
            
            // Animation de la barre
            const pourcentage = (points / maxPoints) * 100;
            document.getElementById('barre-progression').style.width = Math.min(pourcentage, 100) + "%";

            // Logique de la phrase
            const phraseInfo = document.getElementById('phrase-info');
            const pointsRestants = maxPoints - points;

            if (pointsRestants > 1) {
                phraseInfo.innerHTML = "Plus que <strong>" + pointsRestants + " points</strong> avant votre cadeau !";
            } else if (pointsRestants === 1) {
                phraseInfo.innerHTML = "Plus que <strong>1 point</strong> avant votre cadeau !";
            } else {
                phraseInfo.innerHTML = "🎉 <strong>Cadeau débloqué !</strong>";
                phraseInfo.style.color = "var(--primary)";
            }
        }

        // 4. Appel au Google Script pour récupérer les points en direct dans Brevo
        if (email) {
            // Génération du QR Code tout de suite pour que ce soit fluide
            new QRCode(document.getElementById("qrcode"), {
                text: email,
                width: 150,
                height: 150,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // On interroge Brevo via ton Google Script
            fetch(scriptURL + "?email=" + encodeURIComponent(email))
                .then(response => response.json())
                .then(data => {
                    // On met à jour la carte avec les VRAIS points
                    mettreAJourCarte(data.points, data.prenom);
                })
                .catch(error => {
                    console.error("Erreur de récupération :", error);
                    document.getElementById('phrase-info').innerHTML = "<span style='color:#ef4444;'>Erreur de synchronisation</span>";
                    mettreAJourCarte(0, "Client"); // Valeurs par défaut en cas d'erreur
                });
        } else {
            document.getElementById('qrcode').innerHTML = "<p style='color:black; font-size:10px; padding:20px;'>Erreur: Email manquant</p>";
            document.getElementById('phrase-info').innerText = "Veuillez cliquer sur le lien dans votre email.";
            document.getElementById('user-points').innerText = "0";
            document.getElementById('user-points').classList.remove('loading-pulse');
        }
    </script>
</body>
</html>
