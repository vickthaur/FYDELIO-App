<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Carte de Fidélité | FYDELIO</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0F766E; /* Couleur FYDELIO par défaut */
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --primary-glow: rgba(15, 118, 110, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
            background-image: radial-gradient(circle at top center, var(--primary-glow) 0%, transparent 70%);
        }

        .card { 
            background: var(--card-bg); 
            width: 100%; max-width: 380px; 
            border-radius: 32px; padding: 40px 30px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            position: relative;
            overflow: hidden;
        }

        /* Badge FYDELIO discret en haut */
        .brand-badge {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .logo-resto { 
            font-size: 14px; text-transform: uppercase; letter-spacing: 3px; 
            color: #FFFFFF; margin-bottom: 25px; font-weight: 800;
        }

        .welcome { font-size: 18px; margin-bottom: 5px; color: #cbd5e1; }
        .welcome strong { color: white; font-weight: 800; }

        .points-display { margin: 30px 0; }
        .points-number { 
            font-size: 85px; font-weight: 800; color: var(--primary); 
            line-height: 1; margin-bottom: 5px;
            text-shadow: 0 0 30px var(--primary-glow);
            transition: all 0.5s ease;
        }
        
        .points-label { font-size: 12px; color: #64748b; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .progress-container { 
            background: rgba(255,255,255,0.05); height: 16px; 
            border-radius: 20px; margin: 25px 0 15px 0; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .progress-bar { 
            background: linear-gradient(90deg, var(--primary), #2DD4BF); height: 100%; width: 0%; 
            border-radius: 20px; transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 0 15px var(--primary-glow);
        }
        
        #phrase-info { font-size: 14.5px; color: #94a3b8; font-weight: 500; margin-bottom: 30px; line-height: 1.4; }
        #phrase-info strong { color: white; font-weight: 700; }

        .qr-section {
            background: rgba(0,0,0,0.3); padding: 25px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05); margin-top: 10px;
        }

        #qrcode { 
            background: white; padding: 12px; border-radius: 16px; 
            display: inline-block; margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        
        .instructions { font-size: 12px; color: #64748b; line-height: 1.5; font-weight: 500; }

        /* NOUVEAU : CSS BOUTONS WALLET */
        .wallet-actions { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .wallet-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 12px; font-weight: 700; }
        .wallet-buttons { display: flex; gap: 10px; justify-content: center; }
        .wallet-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: #000; color: white; text-decoration: none; font-size: 12px; font-weight: 600; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .wallet-btn img { width: 20px; height: 20px; }
        .wallet-btn:hover { background: #1e293b; border-color: var(--primary); }

        /* CSS BIENTÔT DISPONIBLE */
        .disabled-btn {
            opacity: 0.5;
            cursor: not-allowed;
            border: none;
        }
        .disabled-btn:hover {
            background: #000;
            border-color: rgba(255,255,255,0.2);
            transform: none;
        }

        .btn-avis {
            display: none; width: 100%; background: var(--primary); color: white; 
            text-decoration: none; padding: 15px; border-radius: 14px; 
            font-size: 14px; font-weight: 700; margin-top: 15px; 
            transition: 0.3s;
        }
        .btn-avis:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .loading-pulse { animation: pulse 1.5s infinite; opacity: 0.5; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }

        /* Petit footer app */
        .app-footer {
            margin-top: 25px;
            font-size: 10px;
            color: #475569;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-badge">Propulsé par FYDELIO</div>
        <div class="logo-resto nom-resto">Chargement...</div>
        <p class="welcome">Bonjour <strong id="user-prenom">...</strong></p>
        
        <div class="points-display">
            <div class="points-number loading-pulse" id="user-points">-</div>
            <div class="points-label">Points Fidélité</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="barre-progression"></div>
        </div>

        <p id="phrase-info">Synchronisation FYDELIO en cours...</p>

        <div class="qr-section">
            <div id="qrcode"></div>
            <p class="instructions">Présentez ce QR Code lors de votre passage<br>pour cumuler vos points.</p>
            
            <div class="wallet-actions">
                <p class="wallet-title">Bientôt dans votre Wallet</p>
                <div class="wallet-buttons">
                    <button class="wallet-btn disabled-btn" onclick="alert('L\'intégration Apple Wallet et Google Wallet sera disponible très prochainement ! En attendant, ajoutez cette page à votre écran d\'accueil.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Apple_Wallet_Icon.svg" alt="Apple Wallet">
                        Apple
                    </button>
                    <button class="wallet-btn disabled-btn" onclick="alert('L\'intégration Apple Wallet et Google Wallet sera disponible très prochainement ! En attendant, ajoutez cette page à votre écran d\'accueil.')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Wallet_Icon.svg" alt="Google Wallet">
                        Google
                    </button>
                </div>
            </div>

            <a href="#" id="btn-google" class="btn-avis" target="_blank">⭐ Laissez-nous un avis</a>
        </div>

        <div class="app-footer">Technologie de fidélisation sécurisée v4.0</div>
    </div>

   <script>
    // 1. Initialisation
    const config = appliquerConfig(); 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // On met à jour la couleur primaire selon la config du resto
    if(config.couleur) {
        document.documentElement.style.setProperty('--primary', config.couleur);
    }
    
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');

    // 2. Moteur d'affichage
    function actualiserAffichage(points, prenom) {
        document.getElementById('user-prenom').innerText = prenom;
        
        const ptsElement = document.getElementById('user-points');
        ptsElement.innerText = points;
        ptsElement.classList.remove('loading-pulse');
        
        const pourcentage = (points / config.seuilPoints) * 100;
        document.getElementById('barre-progression').style.width = Math.min(pourcentage, 100) + "%";

        const phraseInfo = document.getElementById('phrase-info');
        const btnGoogle = document.getElementById('btn-google');

        if (points < config.seuilPoints) {
            phraseInfo.innerHTML = `Plus que <strong>${config.seuilPoints - points} points</strong> avant votre cadeau !<br><span style="font-size:12px; color:var(--primary);">${config.recompense}</span>`;
        } else {
            phraseInfo.innerHTML = `🎉 <strong>CADEAU DÉBLOQUÉ !</strong><br><span style="font-size:13px;">Montrez cet écran au serveur.</span>`;
            phraseInfo.style.color = "var(--primary)";
            
            if (config.lienAvisGoogle) {
                btnGoogle.style.display = "block";
                btnGoogle.href = config.lienAvisGoogle;
            }
        }
    }

    // 3. Récupération des données
    async function chargerDonnees() {
        if (!email) {
            document.getElementById('phrase-info').innerHTML = "<span style='color:#ef4444;'>Lien invalide (Email manquant)</span>";
            return;
        }

        // On vide le QR code avant d'en recréer un pour éviter les doublons si ça se rafraîchit
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: email,
            width: 140, height: 140,
            colorDark : "#0f172a", colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        try {
            const nomColonne = (config.id === 'villa_saint_antoine') ? 'points_villa' : 'points_bistrot';

            const { data: client, error } = await _supabase
                .from('clients')
                .select(`prenom, ${nomColonne}`)
                .eq('email', email)
                .maybeSingle();

            if (error) throw error;

            if (client) {
                const pointsClient = client[nomColonne] || 0;
                const prenomClient = client.prenom || "Client";
                actualiserAffichage(pointsClient, prenomClient);
            } else {
                actualiserAffichage(0, "Client");
                document.getElementById('phrase-info').innerHTML = "Bienvenue ! Votre carte FYDELIO est activée.";
            }

        } catch (err) {
            console.error("Erreur FYDELIO:", err);
            actualiserAffichage(0, "Client");
        }
    }

    chargerDonnees();

    // 4. NOUVEAU : ACTUALISATION AUTOMATIQUE (PWA)
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            chargerDonnees(); // Recharge les points quand le client revient sur l'écran
        }
    });
</script>
</body>
</html>
