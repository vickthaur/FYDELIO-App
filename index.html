<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiddle Bro's | Inscription Fidélité</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e293b; 
            --primary-glow: rgba(30, 41, 59, 0.1);
            --success-color: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #1e293b; padding: 20px;
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 40%);
        }
        
        .card { 
            background: #ffffff; width: 100%; max-width: 440px; 
            border-radius: 32px; padding: 45px 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.04); 
            text-align: center; border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .logo-placeholder { font-size: 48px; margin-bottom: 20px; display: block; }
        .restaurant-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #94a3b8; font-weight: 800; margin-bottom: 10px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: #0f172a; letter-spacing: -1px; }
        .subtitle { font-size: 15px; color: #64748b; margin-bottom: 35px; line-height: 1.6; }

        /* Style des champs (Mapping Brevo) */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { 
            display: block; font-size: 10px; font-weight: 800; color: #94a3b8; 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-left: 4px; 
        }
        .form-group input { 
            width: 100%; padding: 15px 18px; border: 2px solid #f1f5f9; 
            border-radius: 14px; font-size: 14px; font-weight: 500;
            background-color: #f8fafc; transition: 0.2s ease;
            font-family: inherit;
        }
        .form-group input:focus { 
            outline: none; border-color: var(--primary); background-color: #fff; 
            box-shadow: 0 0 0 4px var(--primary-glow); 
        }

        button { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; 
            cursor: pointer; transition: 0.3s ease; margin-top: 10px; 
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--primary-glow); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        .footer { font-size: 10px; color: #94a3b8; margin-top: 35px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-state">
            <div id="visual-icon" class="logo-placeholder">🎁</div>
            <div class="restaurant-tag nom-resto">Chargement...</div>
            <h1>Bienvenue</h1>
            <p class="subtitle">
                Inscrivez-vous pour profiter de :<br>
                <strong class="texte-recompense">Chargement...</strong>
            </p>

            <form id="form-inscription" method="POST">
                
                <div class="form-group">
                    <label>Entrez votre PRENOM *</label>
                    <input type="text" id="prenom" name="PRENOM" required>
                </div>

                <div class="form-group">
                    <label>Entrez votre NOM</label>
                    <input type="text" id="nom" name="NOM">
                </div>

                <div class="form-group">
                    <label>Veuillez renseigner votre adresse email *</label>
                    <input type="email" id="email" name="EMAIL" required>
                </div>

                <div class="form-group">
                    <label>Entrez votre SMS *</label>
                    <input type="text" id="sms" name="SMS" placeholder="06XXXXXXXX" required>
                </div>

                <div class="form-group">
                    <label>Entrez votre DATE_ANNIVERSAIRE</label>
                    <input type="text" id="anniversaire" name="DATE_ANNIVERSAIRE" placeholder="JJ/MM/AAAA">
                </div>

                <input type="hidden" name="email_address_check" value="">
                <input type="hidden" name="locale" value="fr">
                <input type="hidden" name="html_type" value="simple">

                <button type="submit" id="btn-submit">S'INSCRIRE 🚀</button>
            </form>
        </div>

        <div class="footer">
            © <span class="nom-resto"></span> — <strong>Fiddle Bro's</strong>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = appliquerConfig();
            const form = document.getElementById('form-inscription');
            const btn = document.getElementById('btn-submit');
            const visualIcon = document.getElementById('visual-icon');

            if (config.id !== "default") {
                form.action = config.formInscription;
                if (config.id === "villa_saint_antoine") visualIcon.innerHTML = "✨";
                if (config.id === "bistrot") visualIcon.innerHTML = "🍴";
            }

            form.addEventListener('submit', async function(e) {
                // 1. On bloque l'envoi immédiat pour faire le travail Supabase
                e.preventDefault(); 
                
                btn.innerText = "Synchronisation...";
                btn.disabled = true;

                // On capture les données
                const emailVal = document.getElementById('email').value.trim().toLowerCase();
                const prenomVal = document.getElementById('prenom').value.trim();
                const nomVal = document.getElementById('nom').value.trim();
                const smsVal = document.getElementById('sms').value.trim();
                const annivVal = document.getElementById('anniversaire').value.trim();

                try {
                    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    // Mise à jour du CRM Supabase
                    await _supabase.from('clients').upsert({ 
                        email: emailVal, 
                        prenom: prenomVal,
                        nom: nomVal,
                        telephone: smsVal,
                        date_anniversaire: annivVal,
                        restaurant_origine: config.id
                    });

                    // Initialisation des points
                    const { data: hasPoints } = await _supabase.from('points')
                        .select('id').eq('client_email', emailVal).eq('restaurant_id', config.id).maybeSingle();

                    if (!hasPoints) {
                        await _supabase.from('points').insert([{
                            client_email: emailVal,
                            restaurant_id: config.id,
                            total_points: config.pointsBienvenue || 0
                        }]);
                    }

                } catch (err) {
                    console.error("Erreur CRM Supabase:", err);
                }

                // 2. On libère l'envoi vers Brevo (qui va rediriger la page)
                form.submit();
            });
        });
    </script>
</body>
</html>
