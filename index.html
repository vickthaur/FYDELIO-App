<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYDELIO | Inscription Premium</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0F766E; /* Vert FYDELIO */
            --primary-glow: rgba(15, 118, 110, 0.15);
            --success-color: #10b981;
            --bg-color: #f8fafc;
            --input-bg: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #1e293b; padding: 20px;
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 50%);
        }
        
        .card { 
            background: #ffffff; width: 100%; max-width: 460px; 
            border-radius: 32px; padding: 45px 40px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); 
            text-align: center; border: 1px solid rgba(0,0,0,0.04);
            position: relative; overflow: hidden;
        }

        .brand-badge {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .logo-placeholder { font-size: 52px; margin-bottom: 18px; display: block; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.05)); }
        .restaurant-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #94a3b8; font-weight: 800; margin-bottom: 8px; }
        h1 { font-size: 30px; font-weight: 800; margin-bottom: 8px; color: #0f172a; letter-spacing: -1px; }
        .subtitle { font-size: 15px; color: #64748b; margin-bottom: 35px; line-height: 1.6; }
        .subtitle strong { color: var(--primary); font-weight: 800; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .full-width { grid-column: span 2; }

        .form-group { text-align: left; }
        .form-group label { 
            display: block; font-size: 10px; font-weight: 800; color: #94a3b8; 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-left: 4px; 
        }
        
        .form-group input { 
            width: 100%; padding: 16px 20px; border: 2px solid transparent; 
            border-radius: 16px; font-size: 15px; font-weight: 500;
            background-color: var(--input-bg); color: #0f172a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }
        .form-group input:focus { 
            outline: none; background-color: #fff; border-color: var(--primary); 
            box-shadow: 0 0 0 5px var(--primary-glow); transform: translateY(-2px);
        }

        button { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 20px; border-radius: 18px; font-size: 16px; font-weight: 800; 
            cursor: pointer; transition: all 0.3s ease; 
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }
        button:hover { transform: translateY(-4px); box-shadow: 0 15px 25px -5px var(--primary-glow); filter: brightness(1.05); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        #success-state { display: none; padding: 20px 0; animation: slideUp 0.5s forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .success-icon { font-size: 72px; margin-bottom: 20px; }
        .footer { font-size: 11px; font-weight: 600; color: #cbd5e1; margin-top: 30px; letter-spacing: 0.5px; }
        #hidden_iframe { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-state">
            <div class="brand-badge">Plateforme FYDELIO</div>
            <div id="visual-icon" class="logo-placeholder">🎁</div>
            <div class="restaurant-tag nom-resto">Chargement...</div>
            <h1>Bienvenue</h1>
            <p class="subtitle">Inscrivez-vous pour profiter de :<br><strong class="texte-recompense">Chargement...</strong></p>

            <form id="form-inscription" method="POST" target="hidden_iframe">
                <div class="form-grid">
                    <div class="form-group">
                        <label>PRÉNOM *</label>
                        <input type="text" id="prenom" name="PRENOM" placeholder="Ex: Jean" required>
                    </div>
                    <div class="form-group">
                        <label>NOM</label>
                        <input type="text" id="nom" name="NOM" placeholder="Ex: Dupont">
                    </div>
                    <div class="form-group full-width">
                        <label>ADRESSE EMAIL *</label>
                        <input type="email" id="email" name="EMAIL" placeholder="jean.dupont@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>MOBILE (SMS) *</label>
                        <input type="text" id="sms" name="SMS" placeholder="06..." required>
                    </div>
                    <div class="form-group">
                        <label>ANNIVERSAIRE</label>
                        <input type="text" id="anniversaire" name="DATE_ANNIVERSAIRE" placeholder="JJ/MM/AAAA">
                    </div>
                </div>
                <input type="hidden" name="email_address_check" value="">
                <input type="hidden" name="locale" value="fr">
                <button type="submit" id="btn-submit">ACTIVER MA CARTE 🚀</button>
            </form>
        </div>

        <div id="success-state">
            <div class="success-icon">✨</div>
            <h2 style="font-size: 26px; font-weight: 800; color: var(--success-color);">C'est validé !</h2>
            <p class="subtitle">Votre compte <strong>FYDELIO</strong> est créé.<br>Votre premier point vous attend.</p>
            <button onclick="window.location.href = window.location.href;" style="background: #f8fafc; color: #64748b; border: 2px solid #f1f5f9;">Retour</button>
        </div>

        <div class="footer">SECURED BY <strong>FYDELIO</strong></div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = appliquerConfig(); 
            const form = document.getElementById('form-inscription');
            const btn = document.getElementById('btn-submit');
            const visualIcon = document.getElementById('visual-icon');

            // On garde ta logique d'icônes par resto
            if (config.id !== "default") {
                form.action = config.formInscription;
                if (config.id === "villa_saint_antoine") visualIcon.innerHTML = "🏛️";
                if (config.id === "bistrot") visualIcon.innerHTML = "🍷";
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault(); 
                btn.innerHTML = 'Initialisation FYDELIO...';
                btn.disabled = true;

                const emailVal = document.getElementById('email').value.trim().toLowerCase();
                const prenomVal = document.getElementById('prenom').value.trim();
                const nomVal = document.getElementById('nom').value.trim();
                const smsVal = document.getElementById('sms').value.trim();
                const annivVal = document.getElementById('anniversaire').value.trim();

                try {
                    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    // --- LA CORRECTION EST ICI ---
                    const colPoints = (config.id === 'villa_saint_antoine') ? 'points_villa' : 'points_bistrot';
                    
                    await _supabase.from('clients').upsert({ 
                        email: emailVal, 
                        prenom: prenomVal,
                        nom: nomVal,
                        telephone: smsVal,
                        date_anniversaire: annivVal,
                        restaurant_origine: config.id,
                        [colPoints]: config.pointsBienvenue // Force l'ajout du point de bienvenue
                    }, { onConflict: 'email' });
                    // -----------------------------

                    // On garde ton envoi vers Brevo
                    form.submit();

                    // On garde ton affichage de succès
                    setTimeout(() => {
                        document.getElementById('form-state').style.display = 'none';
                        document.getElementById('success-state').style.display = 'block';
                    }, 400);

                } catch (err) {
                    console.error("FYDELIO Sync Error:", err);
                    form.submit(); // Sécurité : on tente Brevo même si Supabase a un souci
                }
            });
        });
    </script>
</body>
</html>
