<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidélité - Inscription</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e293b; 
            --primary-glow: rgba(30, 41, 59, 0.15);
            --bg-color: #f8fafc;
            --input-bg: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #1e293b; padding: 20px;
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 50%);
        }
        
        .card { 
            background: #ffffff; width: 100%; max-width: 460px; 
            border-radius: 32px; padding: 45px 40px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); 
            text-align: center; border: 1px solid rgba(0,0,0,0.04);
            position: relative; overflow: hidden;
        }

        .logo-placeholder { font-size: 52px; margin-bottom: 18px; display: block; }
        .restaurant-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #94a3b8; font-weight: 800; margin-bottom: 8px; }
        h1 { font-size: 30px; font-weight: 800; margin-bottom: 8px; color: #0f172a; letter-spacing: -1px; }
        .subtitle { font-size: 15px; color: #64748b; margin-bottom: 35px; line-height: 1.6; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .full-width { grid-column: span 2; }

        .form-group { text-align: left; }
        .form-group label { 
            display: block; font-size: 10px; font-weight: 800; color: #94a3b8; 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; 
        }
        
        .form-group input { 
            width: 100%; padding: 16px 20px; border: 2px solid transparent; 
            border-radius: 16px; font-size: 15px; background-color: var(--input-bg);
            transition: all 0.3s ease;
        }

        .form-group input:focus { 
            outline: none; background-color: #fff; border-color: var(--primary); 
            box-shadow: 0 0 0 5px var(--primary-glow);
        }

        button { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 20px; border-radius: 18px; font-size: 16px; font-weight: 800; 
            cursor: pointer; transition: 0.3s;
        }

        #success-state { display: none; padding: 20px 0; }
        #hidden_iframe { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-state">
            <div id="visual-icon" class="logo-placeholder">🎁</div>
            <div class="restaurant-tag nom-resto">Chargement...</div>
            <h1>Bienvenue</h1>
            <p class="subtitle">Inscrivez-vous pour profiter de :<br><strong class="texte-recompense">Chargement...</strong></p>

            <form id="form-inscription" method="POST" target="hidden_iframe">
                <div class="form-grid">
                    <div class="form-group">
                        <label>PRÉNOM *</label>
                        <input type="text" id="prenom" name="PRENOM" placeholder="Jean" required>
                    </div>
                    <div class="form-group">
                        <label>NOM</label>
                        <input type="text" id="nom" name="NOM" placeholder="Dupont">
                    </div>
                    <div class="form-group full-width">
                        <label>ADRESSE EMAIL *</label>
                        <input type="email" id="email" name="EMAIL" placeholder="jean@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>TÉLÉPHONE *</label>
                        <input type="text" id="sms" name="SMS" placeholder="06..." required>
                    </div>
                    <div class="form-group">
                        <label>ANNIVERSAIRE</label>
                        <input type="text" id="anniversaire" name="DATE_ANNIVERSAIRE" placeholder="JJ/MM/AAAA">
                    </div>
                </div>

                <input type="hidden" name="email_address_check" value="">
                <input type="hidden" name="locale" value="fr">
                <input type="hidden" name="html_type" value="simple">

                <button type="submit" id="btn-submit">S'INSCRIRE 🚀</button>
            </form>
        </div>

        <div id="success-state">
            <div style="font-size:72px">💌</div>
            <h2 style="color:#10b981; margin-top:15px">C'est envoyé !</h2>
            <p class="subtitle">Vérifiez vos emails pour votre carte de fidélité.</p>
        </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. On applique la config (Villa ou Bistrot)
            const config = appliquerConfig();
            const form = document.getElementById('form-inscription');
            const btn = document.getElementById('btn-submit');

            // 2. On branche le bon formulaire Brevo
            if (config.id !== "default") {
                form.action = config.formInscription;
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault(); // On bloque l'envoi immédiat
                
                btn.innerHTML = 'Synchronisation...';
                btn.disabled = true;

                const emailVal = document.getElementById('email').value.trim().toLowerCase();
                const prenomVal = document.getElementById('prenom').value.trim();
                const nomVal = document.getElementById('nom').value.trim();
                const telVal = document.getElementById('sms').value.trim();
                const annivVal = document.getElementById('anniversaire').value.trim();

                try {
                    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    // 3. ENVOI SUPABASE (Table unique 'clients')
                    // Le Trigger SQL s'occupe du point de bienvenue automatiquement
                    await _supabase.from('clients').upsert({ 
                        email: emailVal, 
                        prenom: prenomVal,
                        nom: nomVal,
                        telephone: telVal,
                        date_anniversaire: annivVal,
                        restaurant_origine: config.id
                    });

                    // 4. ENVOI BREVO (Déclenche le mail)
                    form.submit();

                    // 5. AFFICHAGE SUCCÈS
                    setTimeout(() => {
                        document.getElementById('form-state').style.display = 'none';
                        document.getElementById('success-state').style.display = 'block';
                    }, 500);

                } catch (err) {
                    console.error("Erreur:", err);
                    alert("Erreur de connexion. Veuillez réessayer.");
                    btn.disabled = false;
                    btn.innerHTML = "S'INSCRIRE 🚀";
                }
            });
        });
    </script>
</body>
</html>
