<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Félicitations ! | FYDELIO</title>
    
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0F766E; /* Vert FYDELIO */
            --primary-glow: rgba(15, 118, 110, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: #1e293b; 
            padding: 20px;
            background-image: radial-gradient(circle at top right, var(--primary-glow) 0%, transparent 40%);
        }
        
        .card { 
            background: #ffffff; 
            width: 100%; 
            max-width: 420px; 
            border-radius: 32px; 
            padding: 50px 30px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); 
            text-align: center; 
            position: relative; 
            border: 1px solid rgba(0,0,0,0.04);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .brand-badge {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.7;
        }
        
        .icon-check { 
            width: 80px;
            height: 80px;
            background: var(--primary-glow);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
        }

        .restaurant-name { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #94a3b8; 
            font-weight: 700; 
            margin-bottom: 15px; 
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 15px; color: #0f172a; letter-spacing: -0.5px; }
        
        .subtitle { font-size: 15px; color: #64748b; margin-bottom: 35px; line-height: 1.6; }
        .subtitle strong { color: var(--primary); font-weight: 700; }

        .btn-retour { 
            display: inline-block;
            width: 100%; 
            background: var(--primary); 
            color: white; 
            text-decoration: none;
            padding: 18px; 
            border-radius: 16px; 
            font-size: 15px; 
            font-weight: 700; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        .btn-retour:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1);
            box-shadow: 0 15px 20px -3px var(--primary-glow);
        }

        .footer-info {
            margin-top: 30px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
        }

        .fydelio-footer {
            margin-top: 40px;
            font-size: 10px;
            color: #cbd5e1;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-badge">Validation FYDELIO</div>
        <div class="icon-check">✨</div>
        <div class="restaurant-name nom-resto">Chargement...</div>
        
        <h1>Bienvenue !</h1>
        
        <p class="subtitle">
            Votre inscription est validée.<br>
            Vous avez débloqué votre <strong>1er point</strong> de fidélité !
        </p>

        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 35px; line-height: 1.5;">
            Vérifiez vos emails : vous allez recevoir votre carte digitale <strong>FYDELIO</strong> d'ici quelques instants.
        </p>

        <a id="link-retour" href="#" class="btn-retour">Accéder à ma carte</a>

        <div class="footer-info">
            À très vite chez <span class="nom-resto"></span> !
        </div>

        <div class="fydelio-footer">Secured by FYDELIO</div>
    </div>

    <script>
        // 1. On applique la configuration FYDELIO (Couleurs, Nom du resto)
        let config = {};
        if (typeof appliquerConfig === "function") {
            config = appliquerConfig();
        }

        // 2. Le bouton renvoie vers la carte du client (app.html)
        // On récupère l'email s'il est dans l'URL pour faciliter le retour
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email') || "";
        const restoID = config.id || "bistrot";
        
        // Lien vers la Web App
        document.getElementById('link-retour').href = "app.html?resto=" + restoID + "&email=" + email;
    </script>

</body>
</html>
