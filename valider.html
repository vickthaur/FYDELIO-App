<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation - FIDDLE App</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; text-align: center; 
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .validation-box {
            padding: 40px; background: rgba(255,255,255,0.05);
            border-radius: 32px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 340px; width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            transform: scale(0.95); opacity: 0;
            animation: popIn 0.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn { to { transform: scale(1); opacity: 1; } }

        .icon { font-size: 55px; margin-bottom: 15px; display: block; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: rgba(255,255,255,0.8); font-size: 15px; font-weight: 600; line-height: 1.4; }
        
        .score-display { 
            font-size: 70px; font-weight: 800; color: white; 
            margin: 20px 0 10px 0; display: none;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            line-height: 1;
        }

        /* Le Code Couleur pour le Serveur */
        body.success { background-color: #10b981; } /* Vert : +1 Point */
        body.error { background-color: #ef4444; }   /* Rouge : Problème technique */
        body.reward { background-color: #f59e0b; }  /* Or : Cadeau à donner ! */
        body.warning { background-color: #f97316; } /* Orange : Anti-fraude bloqué */

        /* Iframe et Formulaire Invisibles pour Brevo */
        #hidden_iframe_brevo { display: none; width: 0; height: 0; border: none; }
        #brevo_form { display: none; }
    </style>
</head>
<body>

    <div class="validation-box" id="ui-box">
        <span class="icon" id="ui-icon">⏳</span>
        <h1 id="ui-title">Vérification...</h1>
        <p id="ui-text">Sécurisation des données</p>
        <div class="score-display" id="ui-score">0</div>
    </div>

    <iframe name="hidden_iframe_brevo" id="hidden_iframe_brevo"></iframe>
    <form id="brevo_form" method="POST" target="hidden_iframe_brevo">
        <input type="email" id="brevo_email" name="EMAIL">
        <input type="hidden" name="email_address_check" value="">
        <input type="hidden" name="locale" value="fr">
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = appliquerConfig();
            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');

            // Éléments UI
            const uiIcon = document.getElementById('ui-icon');
            const uiTitle = document.getElementById('ui-title');
            const uiText = document.getElementById('ui-text');
            const uiScore = document.getElementById('ui-score');
            
            // Éléments Brevo
            const brevoForm = document.getElementById('brevo_form');
            const brevoEmailInput = document.getElementById('brevo_email');

            function retourScanner(delai) {
                setTimeout(() => {
                    window.location.href = `scanner.html?resto=${config.id}`;
                }, delai);
            }

            async function traiterScan() {
                if (!email) {
                    document.body.classList.add('error');
                    uiIcon.innerText = "❌"; uiTitle.innerText = "Erreur"; uiText.innerText = "QR Code illisible ou email manquant.";
                    return retourScanner(3000);
                }

                try {
                    // 1. VÉRIFICATION CRM
                    const { data: client } = await _supabase.from('clients').select('email').eq('email', email).maybeSingle();
                    if (!client) {
                        await _supabase.from('clients').insert([{ email: email, prenom: 'Client', restaurant_origine: config.id }]);
                    }

                    // 2. LECTURE COMPTEUR
                    const { data: pointsRecord } = await _supabase.from('points')
                        .select('*').eq('client_email', email).eq('restaurant_id', config.id).maybeSingle();

                    let scoreActuel = 0;
                    
                    // 3. BOUCLIER ANTI-FRAUDE 🛡️
                    if (pointsRecord && pointsRecord.derniere_visite && config.delaiAntiFraudeHeures > 0) {
                        const derniereVisite = new Date(pointsRecord.derniere_visite);
                        const maintenant = new Date();
                        const heuresEcoulees = (maintenant - derniereVisite) / (1000 * 60 * 60);

                        if (heuresEcoulees < config.delaiAntiFraudeHeures) {
                            document.body.classList.add('warning');
                            uiIcon.innerText = "⏱️";
                            uiTitle.innerText = "Trop Tôt";
                            uiText.innerText = `Ce client a déjà été scanné il y a moins de ${config.delaiAntiFraudeHeures}h.`;
                            return retourScanner(3500); 
                        }
                    }

                    if (pointsRecord) {
                        scoreActuel = pointsRecord.total_points;
                    }

                    // 4. CALCUL DU NOUVEAU SCORE
                    let nouveauScore;
                    let estCadeau = false;

                    if (scoreActuel >= config.seuilPoints) {
                        nouveauScore = 1; 
                        estCadeau = true;
                    } else {
                        nouveauScore = scoreActuel + 1;
                        if (nouveauScore === config.seuilPoints) estCadeau = true; 
                    }

                    // 5. SAUVEGARDE DANS SUPABASE
                    const dateISO = new Date().toISOString();
                    
                    if (pointsRecord) {
                        await _supabase.from('points')
                            .update({ total_points: nouveauScore, derniere_visite: dateISO })
                            .eq('id', pointsRecord.id);
                    } else {
                        await _supabase.from('points')
                            .insert([{ 
                                client_email: email, 
                                restaurant_id: config.id, 
                                total_points: nouveauScore,
                                derniere_visite: dateISO
                            }]);
                    }

                    // 🚀 6. DÉCLENCHEMENT BREVO (La nouveauté)
                    // On vérifie si un lien formScan existe pour ce resto
                    if (config.formScan && config.formScan !== "#") {
                        brevoForm.action = config.formScan;
                        brevoEmailInput.value = email;
                        brevoForm.submit(); // Envoie l'info à Brevo en silence !
                    }

                    // 7. AFFICHAGE DU RÉSULTAT AU SERVEUR
                    if (estCadeau) {
                        document.body.classList.add('reward');
                        uiIcon.innerText = "🎁";
                        uiTitle.innerText = "CADEAU !";
                        uiText.innerText = "Offrez la récompense au client !";
                    } else {
                        document.body.classList.add('success');
                        uiIcon.innerText = "✅";
                        uiTitle.innerText = "Validé !";
                        uiText.innerText = "Point ajouté avec succès.";
                    }

                    uiScore.style.display = "block";
                    uiScore.innerText = nouveauScore;
                    
                    // On attend un peu plus longtemps (3.5s) pour être sûr que Brevo ait le temps de recevoir l'info avant de quitter
                    retourScanner(3500);

                } catch (err) {
                    console.error("Erreur critique:", err);
                    document.body.classList.add('error');
                    uiIcon.innerText = "⚠️"; uiTitle.innerText = "Erreur réseau"; uiText.innerText = "Le point n'a pas pu être enregistré.";
                    retourScanner(3500);
                }
            }

            // On lance la machine
            traiterScan();
        });
    </script>
</body>
</html>
