<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation | FYDELIO</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #0F766E; 
            --bg-dark: #0f172a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; text-align: center; 
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .validation-box {
            padding: 40px; background: rgba(255,255,255,0.05);
            border-radius: 32px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 340px; width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            transform: scale(0.95); opacity: 0;
            animation: popIn 0.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn { to { transform: scale(1); opacity: 1; } }

        .brand-tag {
            font-size: 10px; font-weight: 800;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 20px;
        }

        .icon { font-size: 55px; margin-bottom: 15px; display: block; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: rgba(255,255,255,0.8); font-size: 15px; font-weight: 600; line-height: 1.4; }
        
        .score-display { 
            font-size: 80px; font-weight: 800; color: white; 
            margin: 20px 0 10px 0; display: none;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            line-height: 1;
        }

        body.success { background-color: #0F766E; } 
        body.error { background-color: #ef4444; }   
        body.reward { background-color: #f59e0b; }  
        body.warning { background-color: #f97316; } 

        #hidden_iframe_brevo { display: none; width: 0; height: 0; border: none; }
        #brevo_form { display: none; }
    </style>
</head>
<body>

    <div class="validation-box" id="ui-box">
        <div class="brand-tag">Système FYDELIO</div>
        <span class="icon" id="ui-icon">⏳</span>
        <h1 id="ui-title">Analyse...</h1>
        <p id="ui-text">Mise à jour du profil client</p>
        <div class="score-display" id="ui-score">0</div>
    </div>

    <iframe name="hidden_iframe_brevo" id="hidden_iframe_brevo"></iframe>
    <form id="brevo_form" method="POST" target="hidden_iframe_brevo">
        <input type="email" id="brevo_email" name="EMAIL">
        <input type="hidden" name="email_address_check" value="">
        <input type="hidden" name="locale" value="fr">
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = appliquerConfig(); 
            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');

            const uiIcon = document.getElementById('ui-icon');
            const uiTitle = document.getElementById('ui-title');
            const uiText = document.getElementById('ui-text');
            const uiScore = document.getElementById('ui-score');
            const brevoForm = document.getElementById('brevo_form');
            const brevoEmailInput = document.getElementById('brevo_email');

            function retourScanner(delai) {
                setTimeout(() => {
                    window.location.href = `scanner.html?resto=${config.id}`;
                }, delai);
            }

            async function traiterScan() {
                if (!email) {
                    document.body.classList.add('error');
                    uiIcon.innerText = "❌"; uiTitle.innerText = "Erreur"; uiText.innerText = "QR Code non reconnu.";
                    return retourScanner(3000);
                }

                try {
                    const maColonne = (config.id === 'villa_saint_antoine') ? 'points_villa' : 'points_bistrot';

                    // 1. RECHERCHE DU CLIENT ET DE LA DATE DU DERNIER SCAN
                    const { data: client, error: fetchError } = await _supabase
                        .from('clients')
                        .select(`*, last_scan_at`)
                        .eq('email', email)
                        .maybeSingle();

                    if (fetchError) throw fetchError;

                    // 🛡️ SÉCURITÉ ANTI-FRAUDE : Le verrouillage des 8 heures
                    if (client && client.last_scan_at) {
                        const dernierScan = new Date(client.last_scan_at).getTime();
                        const maintenant = Date.now();
                        const heuresEcoulees = (maintenant - dernierScan) / (1000 * 60 * 60);

                        if (heuresEcoulees < config.delaiAntiFraudeHeures) {
                            document.body.classList.add('warning');
                            uiIcon.innerText = "🛡️";
                            uiTitle.innerText = "Anti-Fraude";
                            uiText.innerText = "Scan déjà effectué. Revenez plus tard !";
                            return retourScanner(4000);
                        }
                    }

                    let scoreActuel = 0;

                    if (!client) {
                        await _supabase.from('clients').insert([{ email: email, prenom: 'Client', restaurant_origine: config.id }]);
                        scoreActuel = 0;
                    } else {
                        scoreActuel = client[maColonne] || 0;
                    }

                    let nouveauScore;
                    let estCadeau = false;

                    if (scoreActuel >= config.seuilPoints) {
                        nouveauScore = 1;
                        estCadeau = true;
                    } else {
                        nouveauScore = scoreActuel + 1;
                        if (nouveauScore === config.seuilPoints) estCadeau = true; 
                    }

                    // 2. MISE À JOUR : On sauvegarde les points ET l'heure actuelle
                    const { error: updateError } = await _supabase
                        .from('clients')
                        .update({ 
                            [maColonne]: nouveauScore,
                            last_scan_at: new Date().toISOString()
                        })
                        .eq('email', email);

                    if (updateError) throw updateError;

                    // 3. Synchro Brevo
                    if (config.formScan && config.formScan !== "#") {
                        brevoForm.action = config.formScan;
                        brevoEmailInput.value = email;
                        brevoForm.submit(); 
                    }

                    // 4. UI FYDELIO
                    if (estCadeau) {
                        document.body.classList.add('reward');
                        uiIcon.innerText = "🎁";
                        uiTitle.innerText = "CADEAU !";
                        uiText.innerText = "Récompense débloquée.";
                    } else {
                        document.body.classList.add('success');
                        uiIcon.innerText = "✅";
                        uiTitle.innerText = "VALIDÉ";
                        uiText.innerText = "Point ajouté avec succès.";
                    }

                    uiScore.style.display = "block";
                    uiScore.innerText = nouveauScore;
                    
                    retourScanner(3500);

                } catch (err) {
                    console.error("Erreur de traitement FYDELIO:", err);
                    document.body.classList.add('error');
                    uiIcon.innerText = "⚠️"; 
                    uiTitle.innerText = "Erreur Sync"; 
                    uiText.innerText = "Impossible de joindre la base.";
                    retourScanner(4000);
                }
            }

            traiterScan();
        });
    </script>
</body>
</html>
