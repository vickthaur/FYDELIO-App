<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Fiddle</title>
    
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffffff;
            --primary-glow: rgba(255, 255, 255, 0.2);
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0b0d12; 
            color: white; 
            text-align: center; 
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px;
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: popIn 0.5s ease-out; 
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .icon-box { 
            font-size: 80px; 
            margin-bottom: 20px; 
            line-height: 1; 
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes bounceIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .spinner { 
            width: 60px; 
            height: 60px; 
            border: 5px solid rgba(255,255,255,0.1); 
            border-top-color: var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 25px; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        h1 { font-size: 28px; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        p { color: rgba(255,255,255,0.7); font-size: 16px; margin: 0; font-weight: 500; line-height: 1.5; }

        .btn-retour { 
            margin-top: 30px; 
            padding: 15px 35px; 
            border: none; 
            border-radius: 16px; 
            background: white; 
            color: #000; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .btn-retour:active { transform: scale(0.95); }
    </style>
</head>
<body onload="lancerValidation()">

    <audio id="son-succes" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <audio id="son-erreur" src="https://assets.mixkit.co/active_storage/sfx/2954/2954-preview.mp3" preload="auto"></audio>

    <div class="container" id="ui-box">
        <div class="spinner"></div>
        <h1 class="nom-resto">Chargement...</h1>
        <p>Validation du point en cours</p>
    </div>

    <script>
        function lancerValidation() {
            // 1. Charger la config dynamique (le cerveau)
            let config = {};
            if (typeof appliquerConfig === "function") {
                config = appliquerConfig();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const emailClient = urlParams.get('email');
            
            // On récupère le resto pour savoir où retourner
            const restoID = config.id || 'bistrot'; 
            const URL_RETOUR = `scanner.html?resto=${restoID}`;

            const uiBox = document.getElementById('ui-box');
            
            // ⚠️ CORRECTION : On utilise le script de VALIDATION défini dans config.js
            const API_URL = config.scriptValidation;

            if (emailClient && API_URL) {
                // Appel API vers le Google Script (+1 Point)
                fetch(API_URL + "?email=" + encodeURIComponent(emailClient))
                    .then(response => response.json())
                    .then(data => {
                        if(data.success) {
                            // 🟢 SUCCÈS : On passe au VERT
                            document.body.style.backgroundColor = 'var(--success)';
                            document.getElementById('son-succes').play().catch(()=>console.log("Audio bloqué par le navigateur"));
                            
                            uiBox.innerHTML = `
                                <div class="icon-box">✔️</div>
                                <h1>VALIDÉ !</h1>
                                <p>Score actuel :<br><strong>${data.nouveauScore} points</strong></p>
                            `;

                            // Retour automatique au scanner après 2.5 secondes
                            setTimeout(() => {
                                window.location.href = URL_RETOUR;
                            }, 2500);

                        } else {
                            afficherErreur("Erreur : " + (data.message || "Client non reconnu."));
                        }
                    })
                    .catch(error => {
                        afficherErreur("Problème de connexion avec Brevo.");
                    });
            } else {
                afficherErreur(emailClient ? "Config API Validation manquante." : "Aucun email détecté.");
            }

            function afficherErreur(message) {
                // 🔴 ÉCHEC : On passe au ROUGE
                document.body.style.backgroundColor = 'var(--error)';
                document.getElementById('son-erreur').play().catch(()=>console.log("Audio bloqué par le navigateur"));
                
                uiBox.innerHTML = `
                    <div class="icon-box">❌</div>
                    <h1>ERREUR</h1>
                    <p>${message}</p>
                    <button class="btn-retour" onclick="window.location.href='${URL_RETOUR}'">Réessayer</button>
                `;
            }
        }
    </script>
</body>
</html>
