<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation - FIDDLE-App</title>
    
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffffff;
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0b0d12; 
            color: white; 
            text-align: center; 
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px;
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: popIn 0.5s ease-out; 
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .icon-box { 
            font-size: 80px; 
            margin-bottom: 20px; 
            line-height: 1; 
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes bounceIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .spinner { 
            width: 60px; 
            height: 60px; 
            border: 5px solid rgba(255,255,255,0.1); 
            border-top-color: var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 25px; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        h1 { font-size: 28px; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        p { color: rgba(255,255,255,0.7); font-size: 16px; margin: 0; font-weight: 500; line-height: 1.5; }

        .btn-retour { 
            margin-top: 30px; 
            padding: 16px 35px; 
            border: none; 
            border-radius: 16px; 
            background: white; 
            color: #000; 
            font-size: 15px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .btn-retour:active { transform: scale(0.95); }
    </style>
</head>
<body onload="lancerValidation()">

    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <div class="container" id="ui-box">
        <div class="spinner"></div>
        <h1 class="nom-resto">Chargement...</h1>
        <p>Validation du point en cours</p>
    </div>

    <script>
        function lancerValidation() {
            // 1. Charger la config dynamique (FIDDLE-App)
            const config = appliquerConfig();

            // 2. Récupérer les données transmises par le scanner
            const urlParams = new URLSearchParams(window.location.search);
            const emailClient = urlParams.get('email');
            const restoID = urlParams.get('resto') || config.id; 
            
            const uiBox = document.getElementById('ui-box');
            const API_URL = config.scriptValidation;

            // URL de retour au scanner (on garde l'ID resto pour ne pas le perdre)
            const URL_RETOUR = `scanner.html?resto=${restoID}`;

            if (emailClient && API_URL) {
                // 3. Appel au Google Apps Script de VALIDATION
                // On ajoute un timestamp pour éviter tout problème de cache
                const finalRequest = `${API_URL}?email=${encodeURIComponent(emailClient)}&resto=${restoID}&t=${Date.now()}`;

                fetch(finalRequest)
                    .then(response => response.json())
                    .then(data => {
                        if(data.success) {
                            // 🟢 SUCCÈS : Vert
                            document.body.style.backgroundColor = 'var(--success)';
                            try { document.getElementById('snd-success').play(); } catch(e){}
                            
                            uiBox.innerHTML = `
                                <div class="icon-box">✔️</div>
                                <h1>VALIDÉ !</h1>
                                <p>Nouveau score pour ce client :<br><strong>${data.nouveauScore} point${data.nouveauScore > 1 ? 's' : ''}</strong></p>
                            `;

                            // Retour automatique au scanner après 2.5 secondes
                            setTimeout(() => {
                                window.location.href = URL_RETOUR;
                            }, 2500);

                        } else {
                            // 🔴 ERREUR : Rouge (Ex: Client non trouvé)
                            afficherErreur("Erreur : " + (data.message || "Action impossible."));
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        afficherErreur("Erreur de connexion aux serveurs FIDDLE.");
                    });
            } else {
                afficherErreur("Données manquantes (Email ou Resto).");
            }

            function afficherErreur(message) {
                document.body.style.backgroundColor = 'var(--error)';
                uiBox.innerHTML = `
                    <div class="icon-box">❌</div>
                    <h1>ERREUR</h1>
                    <p>${message}</p>
                    <button class="btn-retour" onclick="window.location.href='${URL_RETOUR}'">Réessayer</button>
                `;
            }
        }
    </script>
</body>
</html>
