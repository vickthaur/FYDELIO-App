<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation - FIDDLE</title>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            text-align: center; 
            transition: background-color 0.4s ease;
        }

        .validation-box {
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 320px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            transform: scale(0.95);
            opacity: 0;
            animation: popIn 0.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn { to { transform: scale(1); opacity: 1; } }

        .icon { font-size: 48px; margin-bottom: 20px; display: block; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: rgba(255,255,255,0.7); font-size: 15px; font-weight: 700; }
        
        .score-display { 
            font-size: 64px; 
            font-weight: 800; 
            color: white; 
            margin: 20px 0; 
            display: none;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        /* Classes d'état */
        body.success { background-color: #10b981; } /* Vert émeraude */
        body.error { background-color: #ef4444; }   /* Rouge erreur */
        body.reward { background-color: #f59e0b; }  /* Or pour cadeau */
    </style>
</head>
<body>

    <div class="validation-box" id="ui-box">
        <span class="icon" id="ui-icon">⏳</span>
        <h1 id="ui-title">Traitement...</h1>
        <p id="ui-text">Connexion à la base de données</p>
        <div class="score-display" id="ui-score">0</div>
    </div>

    <script>
        const config = appliquerConfig();
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');

        async function validerPoint() {
            const uiBox = document.getElementById('ui-box');
            const uiIcon = document.getElementById('ui-icon');
            const uiTitle = document.getElementById('ui-title');
            const uiText = document.getElementById('ui-text');
            const uiScore = document.getElementById('ui-score');

            if (!email) {
                document.body.classList.add('error');
                uiIcon.innerText = "❌";
                uiTitle.innerText = "Erreur";
                uiText.innerText = "Email introuvable dans le QR Code.";
                retourScanner(3000);
                return;
            }

            try {
                // 1. On cherche le client dans Supabase
                let { data: client, error: readError } = await _supabase
                    .from('clients')
                    .select('*')
                    .eq('email', email)
                    .single();
                
                let pointsActuels = 0;

                // 2. S'il n'existe pas, on le crée (Upsert implicite)
                if (!client) {
                    const { error: insertError } = await _supabase
                        .from('clients')
                        .insert([{ email: email, prenom: 'Client' }]); // Brevo gérera le vrai prénom plus tard
                    pointsActuels = 0;
                } else {
                    pointsActuels = client[config.colonne_points] || 0;
                }

                // 3. Calcul du nouveau score
                let nouveauScore;
                let estCadeau = false;

                if (pointsActuels >= config.seuilPoints) {
                    // Remise à zéro s'il avait atteint le seuil (il vient chercher son cadeau)
                    nouveauScore = 1; 
                    estCadeau = true;
                } else {
                    nouveauScore = pointsActuels + 1;
                    if (nouveauScore === config.seuilPoints) estCadeau = true;
                }

                // 4. Mise à jour dans Supabase
                const updateObj = {};
                updateObj[config.colonne_points] = nouveauScore;

                const { error: updateError } = await _supabase
                    .from('clients')
                    .update(updateObj)
                    .eq('email', email);

                if (updateError) throw updateError;

                // 5. Affichage du succès (Vert)
                if (estCadeau) {
                    document.body.classList.add('reward');
                    uiIcon.innerText = "🎁";
                    uiTitle.innerText = "CADEAU !";
                    uiText.innerText = "Le client a droit à sa récompense.";
                } else {
                    document.body.classList.add('success');
                    uiIcon.innerText = "✅";
                    uiTitle.innerText = "Validé !";
                    uiText.innerText = "Point ajouté avec succès.";
                }

                uiScore.style.display = "block";
                uiScore.innerText = nouveauScore;
                
                // Retour auto à la caméra
                retourScanner(2000);

            } catch (err) {
                console.error("Erreur Supabase:", err);
                document.body.classList.add('error');
                uiIcon.innerText = "⚠️";
                uiTitle.innerText = "Erreur réseau";
                uiText.innerText = "Le point n'a pas pu être enregistré.";
                retourScanner(3000);
            }
        }

        function retourScanner(delai) {
            setTimeout(() => {
                window.location.href = `scanner.html?resto=${config.id}`;
            }, delai);
        }

        // Lancement direct
        validerPoint();
    </script>
</body>
</html>
