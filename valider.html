<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Fiddle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Poppins', sans-serif; background-color: #1a1a1a; color: white; text-align: center; transition: background-color 0.4s ease-out; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; transform: scale(0.9); animation: popIn 0.4s forwards; }
        @keyframes popIn { to { transform: scale(1); } }
        .icon-box { font-size: 90px; margin-bottom: 10px; line-height: 1; animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .spinner { width: 70px; height: 70px; border: 6px solid rgba(255,255,255,0.1); border-top-color: #ffffff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        h1 { font-size: 32px; margin: 0 0 10px 0; letter-spacing: 1px; }
        p { color: rgba(255,255,255,0.9); font-size: 16px; margin: 0; font-weight: 500;}
        .btn-retour { margin-top: 30px; padding: 12px 30px; border: none; border-radius: 12px; background: white; color: #ef4444; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body onload="lancerValidation()">

    <audio id="son-succes" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <audio id="son-erreur" src="https://assets.mixkit.co/active_storage/sfx/2954/2954-preview.mp3" preload="auto"></audio>

    <div class="container" id="ui-box">
        <div class="spinner"></div>
        <h1>Traitement...</h1>
        <p>Validation sécurisée</p>
    </div>

    <script>
        function lancerValidation() {
            const urlParams = new URLSearchParams(window.location.search);
            const emailClient = urlParams.get('email');
            
            // --- 🔄 GESTION DU MULTI-RESTO ---
            // On récupère le paramètre "resto" (ex: bistrot ou villa_saint_antoine)
            const restoID = urlParams.get('resto') || 'bistrot'; 
            
            // On prépare le lien de retour dynamique vers ton App principale
            const URL_RETOUR = `https://vickthaur.github.io/FIDDLE-App/scanner.html?resto=${restoID}`;

            const uiBox = document.getElementById('ui-box');
            const API_URL = "https://script.google.com/macros/s/AKfycbyjfLm46q2wuOjqn1kwII6bmM4QGGG8iD9S3VXa3bQ3_eL9NvOZQcQ4KEBow4l0mNU9xg/exec";

            if (emailClient) {
                fetch(API_URL + "?email=" + encodeURIComponent(emailClient))
                    .then(response => response.json())
                    .then(data => {
                        if(data.success) {
                            document.body.style.backgroundColor = '#10b981';
                            document.getElementById('son-succes').play().catch(()=>console.log("Son bloqué"));
                            
                            uiBox.innerHTML = `
                                <div class="icon-box">✔️</div>
                                <h1>VALIDÉ !</h1>
                                <p>Score actuel : ${data.nouveauScore} pts</p>
                            `;

                            // Redirection vers le BON scanner après 2 secondes
                            setTimeout(() => {
                                window.location.href = URL_RETOUR;
                            }, 2000);

                        } else {
                            afficherErreur("Erreur lors de l'ajout.");
                        }
                    })
                    .catch(error => {
                        afficherErreur();
                    });
            } else {
                afficherErreur("Aucun QR Code détecté.");
            }

            function afficherErreur(message = "Erreur de connexion API") {
                document.body.style.backgroundColor = '#ef4444';
                document.getElementById('son-erreur').play().catch(()=>console.log("Son bloqué"));
                
                uiBox.innerHTML = `
                    <div class="icon-box">❌</div>
                    <h1>ÉCHEC</h1>
                    <p>${message}</p>
                    <button class="btn-retour" onclick="window.location.href='${URL_RETOUR}'">Retour au Scanner</button>
                `;
            }
        }
    </script>
</body>
</html>
