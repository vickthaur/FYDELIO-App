<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Serveur</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d12;
            --card-bg: rgba(30, 34, 43, 0.7);
            --primary: #ff7675; /* S'adaptera au resto via config.js */
            --primary-glow: rgba(255, 118, 117, 0.3);
            --success: #10b981;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Petit effet de lueur en fond */
            background-image: radial-gradient(circle at top, #1a1f2e 0%, var(--bg-color) 70%);
        }

        .header-title {
            margin-bottom: 25px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header-title h1 { 
            font-size: 24px; 
            font-weight: 700;
            margin: 0 0 5px 0; 
            color: var(--text-main); 
            letter-spacing: 0.5px;
        }

        .header-title p {
            margin: 0;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ----- OVERRIDE DU STYLE MOCKE DE HTML5-QRCODE ----- */
        #reader { 
            width: 100%; 
            max-width: 380px; 
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05) !important; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05); 
            padding-bottom: 15px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* On cache le lien "Powered by" qui fait amateur */
        #reader a { display: none !important; }
        
        /* Les textes par défaut du plugin */
        #reader__dashboard_section_csr span { color: var(--text-muted) !important; font-size: 13px; }
        #reader__dashboard_section_swaplink { color: var(--primary) !important; font-weight: 600; text-decoration: none; margin-top: 10px; display: inline-block; }

        /* Le menu déroulant des caméras */
        #reader select {
            background: rgba(0,0,0,0.3);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            margin-bottom: 15px;
            width: 85%;
            outline: none;
            appearance: none; /* Enlève la flèche moche par défaut */
            text-align: center;
        }

        /* Les boutons natifs (Request Camera, Start Scanning, etc.) */
        #reader button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px 5px;
            box-shadow: 0 8px 15px var(--primary-glow);
        }

        #reader button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #reader__scan_region {
            border-radius: 30px 30px 0 0;
            overflow: hidden;
            background: #000;
        }

        /* --------------------------------------------------- */

        .status { 
            margin-top: 35px; 
            padding: 14px 28px; 
            border-radius: 50px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-out;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary);
            animation: pulse 1.5s infinite;
        }

        .status.success-mode {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
            transform: scale(1.05);
        }

        .status.success-mode .status-dot {
            background: var(--success);
            box-shadow: 0 0 15px var(--success);
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header-title">
        <h1>Scanner Client</h1>
        <p class="nom-resto">Chargement...</p>
    </div>

    <div id="reader"></div>

    <div id="status" class="status">
        <div class="status-dot" id="dot"></div>
        <span id="status-text">Caméra prête</span>
    </div>

    <script>
        // On charge la configuration dynamique (couleurs, nom du resto)
        let config = {};
        if (typeof appliquerConfig === "function") {
            config = appliquerConfig();
        } else {
            // Sécurité si config.js met du temps à charger
            config = { id: "bistrot" };
        }

        function onScanSuccess(decodedText) {
            // Dès qu'on scanne, on stoppe le scanner pour éviter les multi-scans
            html5QrcodeScanner.clear();

            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            
            // Effet visuel immédiat (Passe au vert)
            statusDiv.classList.add('success-mode');
            statusText.innerText = "Validation en cours...";
            
            // Redirection Magique vers la page de validation (le fameux écran Apple Pay)
            setTimeout(() => {
                const urlValidation = "valider.html?resto=" + config.id + "&email=" + encodeURIComponent(decodedText.trim());
                window.location.href = urlValidation;
            }, 300);
        }

        // Configuration du scanner pour qu'il soit rapide et cible bien
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, // Un peu plus rapide
            qrbox: { width: 220, height: 220 }, // Boîte légèrement plus petite pour cibler précis
            aspectRatio: 1.0,
            showTorchButtonIfSupported: true // Active le bouton "Lampe torche" si le tel le permet
        });
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
