<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro - FIDDLE</title>
    
    <script src="config.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #1e293b; 
            --primary-glow: rgba(255,255,255,0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: white; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; text-align: center; 
        }
        
        .header { margin-bottom: 30px; }
        .logo-resto { 
            font-size: 13px; text-transform: uppercase; 
            letter-spacing: 4px; color: var(--primary); font-weight: 800; 
            margin-bottom: 8px;
        }
        .title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }

        /* Conteneur de la caméra Premium */
        #camera-container {
            width: 100%; max-width: 380px; 
            background: #1e293b; 
            border-radius: 32px; 
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #reader { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: none !important; /* On enlève la bordure moche par défaut */
            background: black;
        }
        
        .status { 
            margin-top: 30px; padding: 16px 30px; 
            border-radius: 100px; background: rgba(255,255,255,0.05); 
            font-size: 15px; font-weight: 700; color: #cbd5e1; 
            display: inline-block; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        /* Personnalisation forcée des boutons du scanner natif */
        #reader button { 
            background: var(--primary) !important; color: white !important; 
            border: none !important; padding: 12px 24px !important; 
            border-radius: 12px !important; font-weight: 700 !important; 
            margin-top: 15px !important; cursor: pointer !important; 
            font-family: 'Plus Jakarta Sans', sans-serif !important; 
        }
        #reader a { color: var(--primary) !important; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-resto nom-resto">Chargement...</div>
        <div class="title">Scanner Client</div>
    </div>

    <div id="camera-container">
        <div id="reader"></div>
    </div>
    
    <div class="status" id="statut">En attente d'un QR Code... 📷</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const config = appliquerConfig();
            const statut = document.getElementById('statut');
            
            // Le verrou anti-spam
            let scanVerrouille = false;

            function onScanSuccess(decodedText, decodedResult) {
                // Si on a déjà scanné avec succès il y a 0.5s, on ignore les autres lectures
                if (scanVerrouille) return; 
                scanVerrouille = true;

                // Feedback visuel immédiat pour le serveur
                statut.style.background = "var(--primary)";
                statut.style.color = "white";
                statut.style.borderColor = "var(--primary)";
                statut.innerHTML = "✅ Lecture réussie !";

                // Redirection chirurgicale vers la page de validation
                setTimeout(() => {
                    window.location.href = `valider.html?email=${encodeURIComponent(decodedText)}&resto=${config.id}`;
                }, 600); // Petit délai pour que le serveur voit que ça a marché
            }

            // Configuration optimale du scanner (10 images/seconde, zone de focus claire)
            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            }, false);
            
            html5QrcodeScanner.render(onScanSuccess);
        });
    </script>
</body>
</html>
