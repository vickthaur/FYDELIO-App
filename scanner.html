<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - FIDDLE</title>
    
    <script src="config.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        
        .header { margin-bottom: 30px; }
        .logo-resto { font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: var(--primary); font-weight: 800; }
        .title { font-size: 24px; font-weight: 700; margin-top: 5px; }

        #reader { width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; border: 4px solid rgba(255,255,255,0.1); background: black; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .status { margin-top: 25px; padding: 15px 30px; border-radius: 100px; background: rgba(255,255,255,0.1); font-size: 14px; font-weight: 600; color: #cbd5e1; display: inline-block; }
        
        /* Personnalisation du scanner HTML5-QRCode */
        #reader__dashboard_section_csr button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; margin-top: 15px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-resto nom-resto">Chargement...</div>
        <div class="title">Scanner Client</div>
    </div>

    <div id="reader"></div>
    <div class="status" id="statut">En attente d'un scan...</div>

    <script>
        const config = appliquerConfig();
        const statut = document.getElementById('statut');
        let scanReussi = false;

        function onScanSuccess(decodedText, decodedResult) {
            if (scanReussi) return; 
            scanReussi = true;

            statut.style.background = "var(--primary)";
            statut.style.color = "white";
            statut.innerText = "Scan réussi ! Validation en cours...";

            // Redirection vers la page de validation avec l'email scanné ET l'ID du resto
            setTimeout(() => {
                window.location.href = `valider.html?email=${encodeURIComponent(decodedText)}&resto=${config.id}`;
            }, 800);
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
