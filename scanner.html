<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Serveur - FIDDLE-App</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e293b; 
            --primary-glow: rgba(30, 41, 59, 0.3);
            --bg-color: #0b0d12;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-color); 
            color: white; 
            text-align: center; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top, #1a1f2e 0%, var(--bg-color) 70%);
        }

        .header {
            padding: 40px 20px 20px;
            width: 100%;
            z-index: 10;
        }

        .header p {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 8px;
        }

        h1 { font-size: 24px; font-weight: 800; margin: 0; }

        /* Style du conteneur de scan */
        #reader { 
            width: 100%; 
            max-width: 420px; 
            background: rgba(30, 34, 43, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 32px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            margin-top: 10px;
        }

        /* Personnalisation des boutons et textes internes au plugin */
        #reader__scan_region { background: #000; }
        #reader__dashboard_section_csr button, #reader__dashboard_section_swaplink {
            background: var(--primary) !important;
            color: white !important;
            border: none !important;
            padding: 14px 24px !important;
            border-radius: 14px !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            font-size: 13px !important;
            cursor: pointer !important;
            margin: 10px !important;
        }
        
        #reader__status_span { color: #94a3b8 !important; font-size: 14px !important; }

        .status-bar { 
            margin-top: 30px; 
            padding: 14px 28px; 
            border-radius: 100px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <p>FIDDLE-App — Serveur</p>
        <h1 class="nom-resto">Chargement...</h1>
    </div>

    <div id="reader"></div>

    <div class="status-bar">
        <div class="dot"></div>
        <span id="status-text">Prêt pour le scan client</span>
    </div>

    <script>
        // 1. On charge la config
        const config = appliquerConfig();

        function onScanSuccess(decodedText) {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "Code détecté !";
            statusText.style.color = "#10b981";

            // 2. Nettoyage du scanner et redirection
            // On passe l'email (le texte scanné) et le resto actuel vers valider.html
            html5QrcodeScanner.clear().then(() => {
                const emailEncoded = encodeURIComponent(decodedText.trim());
                window.location.href = `valider.html?resto=${config.id}&email=${emailEncoded}`;
            }).catch(error => {
                // En cas d'erreur de clear, on force quand même la redirection
                window.location.href = `valider.html?resto=${config.id}&email=${encodeURIComponent(decodedText.trim())}`;
            });
        }

        // 3. Lancement du scanner (Configuration technique fluide)
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 20, // Plus de FPS pour une détection instantanée
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });

        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
